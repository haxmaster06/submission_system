server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Allow large file uploads (APK/IPA up to 200MB)
    client_max_body_size 200M;

    # API and PHP Backend
    location /api {
        client_max_body_size 200M;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        client_max_body_size 200M;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass hbm-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Forward proxy headers so Laravel detects HTTPS correctly
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location /storage/ {
        alias /var/www/storage/app/public/;
        add_header Access-Control-Allow-Origin *;
    }

    # Reverb WebSocket Proxy
    location /app/ {
        proxy_pass http://hbm-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Frontend Proxy (must be last or use specific root location)
    location / {
        proxy_pass http://hbm-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
